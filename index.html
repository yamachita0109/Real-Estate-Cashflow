<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="不動産投資の初期費用、月次CF、年次CF、退去費用を計算し、グラフで可視化するシミュレーター"
    >
    <title>不動産投資CFシミュレーター</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Yamashitak Real Estate Cashflow</p>
        <h1>不動産投資CFシミュレーター</h1>
      </div>
      <div class="topbar-actions">
        <label class="storage-select">
          <span>保存先</span>
          <select id="storageMode">
            <option value="local">ローカルストレージ</option>
            <option value="cookie">Cookie</option>
          </select>
        </label>
        <button class="ghost-button" id="loadSampleButton" type="button">サンプル</button>
        <button class="ghost-button" id="resetButton" type="button">リセット</button>
        <button class="primary-button" id="exportButton" type="button">CSV出力</button>
      </div>
    </header>

    <main class="app-shell">
      <aside class="input-panel" aria-label="入力条件">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Inputs</p>
            <h2>入力条件</h2>
          </div>
          <button class="text-button" id="clearStorageButton" type="button">保存削除</button>
        </div>
        <form id="scenarioForm" autocomplete="off">
          <div id="formSections"></div>
        </form>
      </aside>

      <section class="results-panel" aria-label="計算結果">
        <section class="summary-band">
          <div class="scenario-title">
            <p class="eyebrow">Scenario</p>
            <h2 id="scenarioName">サンプル区分マンション</h2>
            <p id="scenarioMeta">区分マンション / 東京都 / 築15年</p>
          </div>
          <div class="judge-card" id="judgeCard">
            <span id="judgeLabel">判定</span>
            <strong id="judgeValue">計算中</strong>
            <p id="judgeReason">入力値を確認中</p>
          </div>
        </section>

        <section class="kpi-grid" id="kpiGrid" aria-label="主要指標"></section>

        <section class="insight-band">
          <div>
            <p class="eyebrow">Risk Check</p>
            <h2>収支耐性</h2>
          </div>
          <div class="risk-list" id="riskList"></div>
        </section>

        <section class="chart-area">
          <div class="chart-header">
            <div>
              <p class="eyebrow">Charts</p>
              <h2>グラフ分析</h2>
            </div>
            <div class="tab-list" role="tablist" aria-label="グラフ切り替え">
              <button class="tab-button active" type="button" data-chart="initial">初期費用</button>
              <button class="tab-button" type="button" data-chart="monthly">月次CF</button>
              <button class="tab-button" type="button" data-chart="annual">年次CF</button>
              <button class="tab-button" type="button" data-chart="projection">推移</button>
              <button class="tab-button" type="button" data-chart="turnover">退去費用</button>
              <button class="tab-button" type="button" data-chart="sensitivity">感度分析</button>
            </div>
          </div>
          <div class="chart-stage" id="chartStage" aria-live="polite"></div>
        </section>

        <section class="detail-grid">
          <article>
            <p class="eyebrow">Monthly</p>
            <h2>月次内訳</h2>
            <div id="monthlyTable"></div>
          </article>
          <article>
            <p class="eyebrow">Annual</p>
            <h2>年次内訳</h2>
            <div id="annualTable"></div>
          </article>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
